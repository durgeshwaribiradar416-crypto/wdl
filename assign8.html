<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>

body{
    background:#1c1c1c;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.calculator{
    background:black;
    padding:20px;
    border-radius:20px;
    width:260px;
}

#display{
    width:100%;
    height:60px;
    font-size:30px;
    text-align:right;
    margin-bottom:15px;
    border:none;
    background:black;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    font-size:20px;
    border:none;
    border-radius:50%;
    cursor:pointer;
}

.number{
    background:#333;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.clear{
    background:#a5a5a5;
}

.equal{
    background:#ff9500;
    color:white;
    grid-column:span 2;
    border-radius:30px;
}

</style>
</head>

<body>
  

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="clear" onclick="deleteLast()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>
</div>

<script>

function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function deleteLast(){
let current=document.getElementById("display").value;
document.getElementById("display").value=current.slice(0,-1);
}

function calculate(){
try{
document.getElementById("display").value =
eval(document.getElementById("display").value);
}
catch{
alert("Invalid Expression");
}
}

</script>

</body>
</html>

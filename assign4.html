<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2{
            color: blue;
            text-align: center;
        }

        table{
            border-collapse: collapse;
            width: 60%;
            margin: auto;
        }

        th{
            background-color: lightgray;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>

</head>

<body>

<!-- Inline CSS -->
<h1 style="color:red; text-align:center;">Student Information</h1>

<h2>Using Different Types of CSS</h2>

<table>
<tr>
<th>Name</th>
<th>Course</th>
<th>Marks</th>
</tr>

<tr>
<td>Durgeshwari</td>
<td>HTML</td>
<td>90</td>
</tr>

<tr>
<td>Rahul</td>
<td>CSS</td>
<td>85</td>
</tr>

<tr>
<td>Priya</td>
<td>JavaScript</td>
<td>88</td>
</tr>

</table>

</body>
</html>
